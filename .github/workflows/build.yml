name: 🧪 Debug Winlator Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_API: 33
  BUILD_TOOLS: 33.0.2
  NDK_VERSION: 25.2.9519653
  CMAKE_VERSION: 3.22.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 🔄 Submodules (ignora erro)
      - name: Init submodules
        run: git submodule update --init --recursive || true

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${BUILD_TOOLS}" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # 🔐 Permissão
      - name: Make gradlew executable
        run: chmod +x gradlew || true

      # 🔨 Build (debug simples)
      - name: Build Debug
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug || true
          else
            echo "gradlew não encontrado 💀"
          fi

      # 🧪 DEBUG REAL
      - name: Debug files
        run: |
          echo "=== LISTANDO ARQUIVOS IMPORTANTES ==="
          find . -type f \( -name "*.apk" -o -name "*.so" -o -name "*.log" \) || true

      # 📤 Upload (não quebra)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            **/*.apk
            **/*.so
            **/*.log
          if-no-files-found: warn
