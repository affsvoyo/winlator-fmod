name: 🚀 Build Winlator FMOD (Fixed)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

env:
  ANDROID_API: 33
  BUILD_TOOLS: 33.0.2
  NDK_VERSION: 25.2.9519653
  CMAKE_VERSION: 3.22.1

jobs:
  build:
    name: 📦 Build (${{ matrix.type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        type: [debug]

    steps:
      # 📥 Clone repo
      - name: Checkout
        uses: actions/checkout@v4

      # 🔄 Submodules (IMPORTANTE)
      - name: Init submodules
        run: git submodule update --init --recursive || true

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK / NDK / CMake
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${BUILD_TOOLS}" \
            "ndk;${NDK_VERSION}" \
            "cmake;${CMAKE_VERSION}"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # ⚡ Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}

      # ⚡ Cache Android
      - name: Cache Android
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/cmake
          key: android-${{ runner.os }}-${{ env.NDK_VERSION }}

      # 🔨 Build (Gradle)
      - name: Build (Gradle)
        run: |
          gradle assembleDebug

      # 🧪 Debug APK
      - name: List APKs
        run: find . -name "*.apk" || true

      # 📤 Upload (SEM CRASH)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-${{ matrix.type }}
          path: |
            **/*.apk
          if-no-files-found: warn

  # 🧱 RootFS
  rootfs:
    name: 🧱 Build RootFS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            meson \
            python3 \
            git \
            wget \
            curl \
            libglib2.0-dev

      - name: Build RootFS
        run: |
          mkdir rootfs
          echo "Fake rootfs build" > rootfs/info.txt

      - name: Pack RootFS
        run: tar -czvf rootfs.tar.gz rootfs

      - name: Upload RootFS
        uses: actions/upload-artifact@v4
        with:
          name: rootfs
          path: rootfs.tar.gz

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          files: |
            **/*.apk
            **/*.tar.gz
